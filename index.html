<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🦴 Ayuda a los Peluditos</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: #0b0e14;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 30px 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            margin: 20px auto;
        }

        h1 {
            font-size: 2.4rem;
            background: linear-gradient(135deg, #f9d976, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 4px;
        }

        .sub {
            color: #ccc;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 20px;
        }

        input[type="email"] {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1rem;
            font-family: 'Quicksand', sans-serif;
            outline: none;
            margin-bottom: 12px;
        }

        input:focus {
            border-color: #f39c12;
        }

        button {
            padding: 14px;
            border-radius: 40px;
            border: none;
            font-weight: 700;
            font-family: 'Quicksand', sans-serif;
            cursor: pointer;
            transition: transform 0.15s;
            font-size: 1rem;
            width: 100%;
            margin-bottom: 10px;
        }

        button:hover {
            transform: scale(1.02);
        }

        .btn-login {
            background: linear-gradient(135deg, #6dd5ed, #2193b0);
            color: #fff;
        }

        .status {
            font-size: 0.9rem;
            color: #bbb;
            margin-top: 10px;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        /* ----- Saldo y sección interna ----- */
        .saldo-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 60px;
            padding: 10px 18px;
            margin: 16px 0;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .saldo-bar span {
            font-size: 1.1rem;
        }

        .saldo-bar .num {
            font-weight: 700;
            font-size: 1.4rem;
            color: #f9d976;
        }

        .btn-comprar {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            width: auto;
        }

        .btn-logout {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ddd;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            width: auto;
        }

        /* ----- Lista de animales ----- */
        .animales-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
            margin-top: 16px;
        }

        .animal-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.04);
            padding: 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .animal-card img {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            background: #222;
            flex-shrink: 0;
        }

        .animal-info {
            flex: 1;
        }

        .animal-info .nombre {
            font-weight: 600;
            font-size: 1rem;
        }

        .animal-info .raza {
            font-size: 0.8rem;
            color: #aaa;
        }

        .animal-info .creditos {
            font-size: 0.85rem;
            color: #f9d976;
            margin-top: 2px;
        }

        .btn-donar {
            background: linear-gradient(135deg, #f9d976, #f39c12);
            color: #0b0e14;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.8rem;
            width: auto;
            flex-shrink: 0;
        }

        .btn-donar:hover {
            transform: scale(1.05);
        }

        .footer {
            margin-top: 24px;
            font-size: 0.8rem;
            color: #888;
            text-align: center;
        }

        .diagnostico {
            font-size: 0.85rem;
            padding: 10px;
            border-radius: 16px;
            margin-top: 12px;
            display: none;
        }

        .diagnostico.error {
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid #e74c3c;
            color: #e74c3c;
            display: block;
        }

        .diagnostico.success {
            background: rgba(46, 204, 113, 0.15);
            border: 1px solid #2ecc71;
            color: #2ecc71;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦴 Ayuda a los Peluditos</h1>
        <p class="sub">1 huesito = $1.000 COP</p>

        <!-- ===== AUTENTICACIÓN ===== -->
        <div id="authSection">
            <input type="email" id="authEmail" placeholder="Correo electrónico" />
            <button class="btn-login" id="btnLogin">Ingresar / Registrarse</button>
            <div class="status" id="authStatus">🔒 Ingresa tu correo para comenzar</div>
            <div id="diagnostico" class="diagnostico"></div>
        </div>

        <!-- ===== SECCIÓN PRINCIPAL (logueado) ===== -->
        <div id="mainSection" class="hidden">
            <div class="saldo-bar">
                <span>🦴 Huesitos: <span class="num" id="saldoUsuario">0</span></span>
                <button class="btn-comprar" id="btnComprar">➕ Comprar</button>
                <button class="btn-logout" id="btnLogout">Cerrar</button>
            </div>

            <div style="margin-top: 8px; font-size:0.9rem; color:#aaa;">
                🏠 Peluditos en riesgo
            </div>
            <div class="animales-grid" id="animalesGrid">
                <!-- Se llena con JS -->
            </div>
        </div>

        <div class="footer">💙 100% a alimentación, veterinaria y refugio</div>
    </div>

    <script>
        // ================================================================
        //  CONFIGURACIÓN
        // ================================================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxCbsaJeTk0egZt6Dy3cJ-XD4ZUqdR1jPbdKAS0spw12YnS9-Sf4YEA-GITzSfimzDg/exec"; // <-- CAMBIA ESTO

        // ================================================================
        //  1.  DATOS DE ANIMALES (igual que antes)
        // ================================================================
        const nombresPerro = [
            "Max", "Luna", "Rocky", "Bella", "Toby", "Coco", "Nala", "Simba",
            "Bruno", "Daisy", "Charlie", "Lola", "Thor", "Molly", "Leo",
            "Kira", "Rex", "Milo", "Lily", "Oscar", "Zeus", "Maya", "Jack",
            "Sasha", "Tango", "Roko", "Lúa", "Koda", "Akira", "Tita"
        ];

        const nombresGato = [
            "Mishi", "Garfield", "Salem", "Luna", "Simba", "Mia",
            "Tigre", "Pelusa", "Negro", "Canela", "Ginger", "Nube"
        ];

        const razasPerro = [
            "Labrador", "Golden", "Bulldog", "Beagle", "Pastor Alemán",
            "Chihuahua", "Poodle", "Rottweiler", "Yorkshire", "Dachshund",
            "Pomerania", "San Bernardo", "Husky", "Border Collie", "Doberman",
            "Shih Tzu", "Boxer", "Gran Danés", "Cocker", "Pug",
            "Maltés", "Schnauzer", "Akita", "Weimaraner", "Corgi",
            "Bichón", "Terrier", "Galgo", "Mastín", "Setter"
        ];

        const razasGato = [
            "Siamés", "Persa", "Maine Coon", "Bengala", "Sphynx",
            "Británico", "Fold", "Oriental", "Ragdoll", "Angora",
            "Bombay", "Cali"
        ];

        const descripciones = [
            "Rescatado de la calle, desnutrido y con miedo.",
            "Vagaba en un barrio peligroso, tiene heridas leves.",
            "Fue encontrado en una alcantarilla, está muy delgado.",
            "Lleva meses en la calle, sobrevive como puede.",
            "Tiene sarna y parásitos, pero es muy manso.",
            "Siempre se acerca a las personas, busca cariño.",
            "Vive en un parque, las lluvias lo afectan mucho.",
            "Tiene una pata lastimada, no puede caminar bien.",
            "Es muy juguetón a pesar de su situación.",
            "Se refugia en un lote baldío, tiene hambre y sed."
        ];

        function generarAnimales() {
            const animales = [];
            for (let i = 0; i < 30; i++) {
                animales.push({
                    id: `perro-${i}`,
                    tipo: 'perro',
                    nombre: nombresPerro[i],
                    raza: razasPerro[i % razasPerro.length] + ' (criollo)',
                    descripcion: descripciones[i % descripciones.length],
                    imagen: `https://picsum.photos/seed/perro-${i}/200/200`
                });
            }
            for (let i = 0; i < 12; i++) {
                animales.push({
                    id: `gato-${i}`,
                    tipo: 'gato',
                    nombre: nombresGato[i],
                    raza: razasGato[i % razasGato.length] + ' (criollo)',
                    descripcion: descripciones[(i + 3) % descripciones.length],
                    imagen: `https://picsum.photos/seed/gato-${i}/200/200`
                });
            }
            return animales;
        }

        const ANIMALES = generarAnimales();

        // ================================================================
        //  2.  FUNCIONES DE COMUNICACIÓN CON GOOGLE SHEETS
        // ================================================================

        // Obtener saldo de un correo
        async function fetchSaldo(email) {
            const url = `${SCRIPT_URL}?action=getSaldo&email=${encodeURIComponent(email)}`;
            const resp = await fetch(url);
            const data = await resp.json();
            return data;
        }

        // Obtener créditos de todos los animales
        async function fetchCreditosAnimales() {
            const url = `${SCRIPT_URL}?action=getCreditosAnimales`;
            const resp = await fetch(url);
            const data = await resp.json();
            return data;
        }

        // Donar: restar saldo al usuario y sumar al animal
        async function donar(email, animalId, cantidad) {
            const resp = await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // importante para evitar CORS en desarrollo, pero no podremos leer respuesta
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'donar',
                    email,
                    animalId,
                    cantidad
                })
            });
            // Como usamos no-cors, no podemos leer la respuesta directamente.
            // Para solucionarlo, el script debería devolver un JSON, pero con no-cors solo podemos saber si fue exitoso.
            // En su lugar, usaremos 'cors' si el script lo permite.
            // Mejor usamos 'cors' y leemos la respuesta.
            // Cambiamos a modo 'cors' (el script debe permitir origen * o el dominio)
            // Para simplificar, haremos un segundo intento con cors.
            // Pero mejor configuramos el script para que acepte cualquier origen.
            // En este ejemplo, usaremos cors.
            const resp2 = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'donar',
                    email,
                    animalId,
                    cantidad
                })
            });
            const data = await resp2.json();
            return data;
        }

        // ================================================================
        //  3.  DOM y ESTADO
        // ================================================================

        const authSection = document.getElementById('authSection');
        const mainSection = document.getElementById('mainSection');
        const authEmail = document.getElementById('authEmail');
        const btnLogin = document.getElementById('btnLogin');
        const btnLogout = document.getElementById('btnLogout');
        const btnComprar = document.getElementById('btnComprar');
        const authStatus = document.getElementById('authStatus');
        const diagnostico = document.getElementById('diagnostico');
        const saldoUsuario = document.getElementById('saldoUsuario');
        const animalesGrid = document.getElementById('animalesGrid');

        let usuarioActual = '';
        let saldoActual = 0;
        let creditosAnimales = {}; // objeto { id: creditos }

        // ================================================================
        //  4.  UI
        // ================================================================

        function mostrarDiagnostico(mensaje, tipo = 'error') {
            diagnostico.textContent = mensaje;
            diagnostico.className = 'diagnostico ' + tipo;
        }

        function ocultarDiagnostico() {
            diagnostico.className = 'diagnostico';
            diagnostico.textContent = '';
        }

        function actualizarSaldoUI() {
            saldoUsuario.textContent = saldoActual;
        }

        function actualizarAnimales() {
            animalesGrid.innerHTML = '';
            const sorted = [...ANIMALES].sort((a, b) => a.nombre.localeCompare(b.nombre));
            sorted.forEach(animal => {
                const creditos = creditosAnimales[animal.id] || 0;
                const div = document.createElement('div');
                div.className = 'animal-card';
                div.innerHTML = `
                    <img src="${animal.imagen}" alt="${animal.nombre}" loading="lazy" />
                    <div class="animal-info">
                        <div class="nombre">${animal.nombre} <span style="font-size:0.8rem;color:#888;">${animal.tipo === 'perro' ? '🐕' : '🐈'}</span></div>
                        <div class="raza">${animal.raza}</div>
                        <div class="creditos">🦴 ${creditos} huesitos</div>
                        <div style="font-size:0.75rem;color:#aaa;margin-top:2px;">${animal.descripcion}</div>
                    </div>
                    <button class="btn-donar" onclick="donarCredito('${animal.id}', '${animal.nombre}')">Donar 🥫</button>
                `;
                animalesGrid.appendChild(div);
            });
        }

        // ================================================================
        //  5.  LOGIN / LOGOUT
        // ================================================================

        async function loginUsuario(email) {
            if (!email || !email.includes('@')) {
                mostrarDiagnostico('❌ Ingresa un correo válido.', 'error');
                return;
            }
            usuarioActual = email;

            // Obtener saldo desde la nube
            try {
                const data = await fetchSaldo(email);
                if (data.error) {
                    mostrarDiagnostico('❌ Error: ' + data.error, 'error');
                    return;
                }
                saldoActual = data.saldo || 0;
                // Guardar en localStorage solo para recordar el email (no el saldo)
                localStorage.setItem('peluditos_email', email);

                // Cargar créditos de animales
                const creditosData = await fetchCreditosAnimales();
                if (creditosData.error) {
                    mostrarDiagnostico('❌ Error al cargar animales: ' + creditosData.error, 'error');
                    return;
                }
                creditosAnimales = creditosData;

                // Mostrar UI logueada
                authSection.classList.add('hidden');
                mainSection.classList.remove('hidden');
                actualizarSaldoUI();
                actualizarAnimales();
                authStatus.textContent = `✅ Conectado como ${email}`;
                authStatus.style.color = '#2ecc71';
                ocultarDiagnostico();
            } catch (err) {
                mostrarDiagnostico('❌ Error de conexión: ' + err.message, 'error');
            }
        }

        function logoutUsuario() {
            usuarioActual = '';
            localStorage.removeItem('peluditos_email');
            authSection.classList.remove('hidden');
            mainSection.classList.add('hidden');
            authStatus.textContent = '🔒 Ingresa tu correo para comenzar';
            authStatus.style.color = '#bbb';
            saldoActual = 0;
            creditosAnimales = {};
            saldoUsuario.textContent = '0';
            animalesGrid.innerHTML = '';
            ocultarDiagnostico();
        }

        btnLogin.addEventListener('click', () => {
            loginUsuario(authEmail.value.trim());
        });

        btnLogout.addEventListener('click', logoutUsuario);

        // Auto-login
        const emailGuardado = localStorage.getItem('peluditos_email');
        if (emailGuardado) {
            authEmail.value = emailGuardado;
            loginUsuario(emailGuardado);
        }

        // ================================================================
        //  6.  COMPRA DE HUESITOS (simulada con WhatsApp)
        // ================================================================

        btnComprar.addEventListener('click', () => {
            if (!usuarioActual) return;
            const cantidad = prompt('¿Cuántos huesitos quieres comprar? (1 huesito = $1.000 COP)', '5');
            if (cantidad && parseInt(cantidad) > 0) {
                const num = parseInt(cantidad);
                if (confirm(`Vas a comprar ${num} huesitos por $${num * 1000} COP. ¿Confirmas?`)) {
                    const mensaje = `Hola, acabo de realizar el pago de ${num} huesitos por Nequi (3138237540) para mi correo: ${usuarioActual}. Adjunto el comprobante.`;
                    window.open(`https://api.whatsapp.com/send?phone=573138237540&text=${encodeURIComponent(mensaje)}`, '_blank');
                    alert('✅ Gracias por tu compra. Envía el comprobante y en breve acreditaremos tus huesitos.');
                }
            }
        });

        // ================================================================
        //  7.  DONAR HUESITOS A UN ANIMAL
        // ================================================================

        window.donarCredito = async function(animalId, animalNombre) {
            if (!usuarioActual) {
                alert('Debes iniciar sesión.');
                return;
            }
            const cantidad = prompt(`¿Cuántos huesitos quieres donar a ${animalNombre}? (Saldo: ${saldoActual})`, '1');
            if (!cantidad || parseInt(cantidad) < 1) return;
            const num = parseInt(cantidad);
            if (num > saldoActual) {
                alert('❌ No tienes suficientes huesitos.');
                return;
            }

            try {
                const resultado = await donar(usuarioActual, animalId, num);
                if (resultado.error) {
                    alert('❌ Error: ' + resultado.error);
                    return;
                }
                // Actualizar saldo local
                saldoActual = resultado.nuevoSaldo;
                // Actualizar créditos del animal local
                creditosAnimales[animalId] = resultado.nuevosCreditosAnimal;

                actualizarSaldoUI();
                actualizarAnimales();
                alert(`✅ Has donado ${num} huesitos a ${animalNombre}.`);
            } catch (err) {
                alert('❌ Error al donar: ' + err.message);
            }
        };

        console.log('🐾 Sistema conectado a Google Sheets.');
        console.log('📌 Los datos se guardan en la nube.');
        console.log('🦴 1 huesito = $1.000 COP. ¡Gracias por ayudar a los peluditos!');
    </script>
</body>
</html>
